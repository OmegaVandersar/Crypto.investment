<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investor Dashboard - Crypto Investment Company</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #0b0f19;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        .container {
            background: white;
            margin: 30px;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #0b0f19;
            color: white;
            padding: 12px;
            border: none;
            margin-top: 20px;
            width: 100%;
        }

        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>

    <h2>Crypto Investment Company</h2>

    <nav>
        <a href="index.html">Home</a>
        <a href="wallet.html">Deposit</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>

<div class="container">

    <h2>Investor Dashboard</h2>

    <p>Fill the form below after making your deposit.</p>

    <label>Full Name</label>
    <input type="text" placeholder="Enter your full name">

    <label>Email</label>
    <input type="email" placeholder="Enter your email">

    <label>Investment Plan</label>
    <select>
        <option>Starter Plan</option>
        <option>Premium Plan</option>
        <option>VIP Plan</option>
    </select>

    <label>Investment Amount ($)</label>
    <input type="number" placeholder="Enter amount">

    <label>Wallet Used</label>
    <select>
        <option>Bitcoin</option>
        <option>USDT TRC20 option>
      </option> Ethereum<option></option>
    </select>

    <label>Transaction ID</label>
    <input type="text" placeholder="Enter transaction ID">

    <button>Submit Investment</button>

</div>

<footer>

    <p>© 2020 Crypto Investment Company | Canada</p>

</footer>

</body>
      </html>
